name: Release SDK

on:
  push:
    branches:
      - main
      - staging
      - dev
    paths:
      - 'packages/sdk/**'
      - '.changeset/**'
      - '.github/workflows/release-sdk.yml'
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Version & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @mysten/memwal typecheck

      - name: Build SDK
        run: pnpm build:sdk

      # ── main branch → stable release (latest) ──
      - name: Create Release PR or Publish to npm
        if: github.ref == 'refs/heads/main'
        uses: changesets/action@v1
        with:
          title: 'chore: version packages'
          commit: 'chore: version packages'
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── staging branch → release candidate (rc tag) ──
      - name: Publish staging release candidate
        if: github.ref == 'refs/heads/staging'
        run: |
          npx changeset pre enter rc 2>/dev/null || true
          npx changeset version
          pnpm changeset publish --tag rc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── dev branch → prerelease (dev tag) ──
      - name: Publish dev prerelease
        if: github.ref == 'refs/heads/dev'
        run: |
          npx changeset pre enter dev 2>/dev/null || true
          npx changeset version
          pnpm changeset publish --tag dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
