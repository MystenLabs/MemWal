name: Commit Guard

# Third enforcement layer. The Claude Code PreToolUse hook stops AI-driven
# commits, and the local commit-msg hook stops anything reaching a working
# tree. This Action catches what slips past both — commits authored via the
# GitHub web UI, the GitHub API, or a fresh clone that skipped
# scripts/install-hooks.sh.

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']

permissions:
  contents: read
  pull-requests: read

jobs:
  scan:
    name: Block Claude / AI signatures
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Resolve commit range
        id: range
        run: |
          set -e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE="$(git rev-parse "$HEAD~1" 2>/dev/null || echo "$HEAD")"
            fi
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "head=$HEAD" >> "$GITHUB_OUTPUT"
          echo "Range: $BASE..$HEAD"

      - name: Scan commit messages
        env:
          BASE: ${{ steps.range.outputs.base }}
          HEAD: ${{ steps.range.outputs.head }}
        run: |
          set -e
          PATTERNS='Claude|Anthropic|Co-Authored-By:[[:space:]]*Claude|🤖 Generated with \[Claude Code\]'

          if [ "$BASE" = "$HEAD" ]; then
            SHAS="$HEAD"
          else
            SHAS="$(git rev-list "$BASE..$HEAD")"
          fi

          fail=0
          for sha in $SHAS; do
            msg="$(git log -1 --format=%B "$sha")"
            if printf '%s' "$msg" | grep -qiE "$PATTERNS"; then
              hits="$(printf '%s' "$msg" | grep -inE "$PATTERNS" | head -5)"
              echo "::error title=Forbidden signature in commit::Commit $sha matches forbidden pattern"
              echo "::group::$sha — offending lines"
              printf '%s\n' "$hits"
              echo "::endgroup::"
              echo "::group::$sha — full message"
              printf '%s\n' "$msg"
              echo "::endgroup::"
              fail=1
            fi
          done

          if [ "$fail" -eq 1 ]; then
            cat >&2 <<'EOF'

✖ Commit Guard failed: one or more commits contain forbidden bot signatures.

Forbidden patterns: Claude, Anthropic, Co-Authored-By: Claude,
🤖 Generated with [Claude Code]

To fix:
  git rebase -i <base>          # mark offending commits as 'reword'
  # rewrite the messages without the forbidden strings
  git push --force-with-lease   # update the PR branch

EOF
            exit 1
          fi

          echo "✓ All commits in range are clean."
