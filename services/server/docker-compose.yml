name: memwal

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: memwal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: memwal
      POSTGRES_USER: memwal
      POSTGRES_PASSWORD: memwal_secret
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - memwal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memwal"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m
          cpus: "0.25"

  redis:
    image: redis:7-alpine
    container_name: memwal-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - memwal_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300m
          cpus: "0.5"
        reservations:
          memory: 64m
          cpus: "0.1"

volumes:
  memwal_pgdata:
  memwal_redis:
