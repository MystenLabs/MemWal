# Walrus Memory Benchmark Configuration
#
# Copy this file to config.yaml and fill in the credentials below.
# config.yaml is gitignored — never commit real keys.
#
# This is the benchmark harness config only. Walrus Memory server config is
# separate and lives in services/server/.env (see .env.example there).
# The benchmark harness only needs (1) how to reach the server and
# (2) an LLM provider for answer generation and judging.

# ─────────────────────────────────────────────────────────────────────
# Walrus Memory server connection
# ─────────────────────────────────────────────────────────────────────
server:
  # URL of the running Walrus Memory server. Default is the local dev port.
  # If the server runs elsewhere (Docker, remote host), update this.
  url: http://localhost:3001

  # Ed25519 delegate private key (raw hex, 32 bytes = 64 hex chars).
  # Where to get one:
  #   1. Via the memwal app: register an account, export delegate key
  #   2. Via the @mysten-incubation/memwal SDK: generateDelegateKey()
  # The key's public half must be registered on-chain as a delegate
  # for the account_id below, otherwise every request gets 401.
  delegate_key: ""

  # Walrus Memory account object ID on Sui (0x... hex).
  # Found in the app settings, or returned by the SDK's create account
  # flow. Required because a single delegate key can be associated
  # with multiple accounts; this header picks which one.
  account_id: ""

# ─────────────────────────────────────────────────────────────────────
# LLM judge — evaluates generated answers vs ground truth
# ─────────────────────────────────────────────────────────────────────
judge:
  # Model used for judging. Published memory benchmarks
  # all use GPT-4o — keep this consistent for comparable numbers.
  # Other models will produce different scores.
  model: openai/gpt-4o

  # OpenRouter or OpenAI API key. Required.
  api_key: ""

  # API base URL. OpenRouter is cost-effective and we use it in our
  # Walrus Memory server config too. Swap for OpenAI direct if preferred:
  #   api_base: https://api.openai.com/v1
  #   model: gpt-4o   (no vendor prefix for OpenAI direct)
  api_base: https://openrouter.ai/api/v1

# ─────────────────────────────────────────────────────────────────────
# Answer generation — produces the response to judge
# ─────────────────────────────────────────────────────────────────────
answer:
  # A smaller, cheaper model is fine here since it's just stitching
  # together recalled memories into an answer. Uses the same api_key
  # and api_base as the judge.
  model: openai/gpt-4o-mini

# ─────────────────────────────────────────────────────────────────────
# Benchmark execution tuning
# ─────────────────────────────────────────────────────────────────────
benchmarks:
  # Parallel workers during ingestion (analyze calls).
  # Higher = faster ingestion, but the Walrus Memory server's rate limits
  # and OpenRouter's rate limits cap practical throughput. 5-10 is a
  # good default for localhost.
  concurrency: 10

  # Parallel workers during eval (recall + answer + judge).
  # Can go higher than ingestion since these don't hit Walrus.
  # 8-20 works well. Too high and you trigger 429s from the server
  # or OpenRouter — client retries with backoff but it slows you down.
  eval_concurrency: 20

  # Top-K memories retrieved per query. LOCOMO/LongMemEval run with 10.
  # Bumping to 20-30 can help recall at cost of more LLM context size.
  recall_limit: 10

  # How conversations are chunked before calling /api/analyze.
  # adapter = use each benchmark adapter's documented default.
  # per_turn = one analyze call per turn; closest to SDK replay.
  # session = concatenate each session into one analyze call; useful for
  # apples-to-apples comparison with the 2026-04-20 LongMemEval run.
  ingest_strategy: adapter
  # Optional per-benchmark override:
  # ingest_strategy_by_benchmark:
  #   locomo: per_turn
  #   longmemeval: session

  # Phase-2 experiment toggles. All default false to preserve the
  # 2026-05-21 extract.v5 baseline unless a run opts in explicitly.
  extract_with_critique: false
  contextual_embedding: false
  adaptive_k: false
  # Optional fixed hint for adaptive-k runs: lookup | standard | composition | survey.
  # Leave unset to let the server classify when adaptive_k=true.
  # limit_hint: composition

  # How many times to run the judge per query.
  # 1 = fastest, 1 data point per query. Judge has some variance
  #     (~±2-3 points) but retrieval is deterministic given fixed
  #     weights, so 1 is often enough for preset comparisons.
  # 3-5 = publication quality, lets you report mean ± std.
  eval_runs: 1
